<button class="hamburger" (click)="toggle()">
  @if (isOpen()) {
    ✕
  } @else {
    ☰
  }
</button>

@if (isOpen()) {
  <div class="overlay" (click)="close()"></div>
}

<nav class="sidebar" [class.open]="isOpen()" (mouseleave)="close()">
  <div class="sidebar-header">
    <img src="./assets/dragonball.svg" alt="Dragon Ball" class="logo" />
    <h2>Dragon Ball</h2>
  </div>

  <ul>
    <li>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="close()">
        🏠 Inicio
      </a>
    </li>
    <li>
      <a routerLink="/characters" routerLinkActive="active" (click)="close()">
        🐉 Personajes
      </a>
    </li>
    <li>
      <a routerLink="/planets" routerLinkActive="active" (click)="close()">
        🪐 Planetas
      </a>
    </li>
  </ul>

  <div class="theme-toggle">
    <span>{{ isDark() ? '🌙' : '☀️' }}</span>
    <label class="switch">
      <input type="checkbox" [checked]="isDark()" (change)="toggleTheme()" />
      <span class="slider"></span>
    </label>
  </div>

</nav>
